<html lang="en">

<title>Bklynsdon — Creator Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:#080808; --bg2:#0f0f0f; --bg3:#161616; --bg4:#1e1e1e;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --text:#f0f0f0; --muted:rgba(240,240,240,0.45);
  --accent:#4d8cff; --accent-dim:rgba(77,140,255,0.14); --accent-glow:rgba(77,140,255,0.28);
  --green:#53FC18; --green-dim:rgba(83,252,24,0.1);
  --purple:#9146FF; --red:#FF0000;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif}
a{color:inherit;text-decoration:none}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;outline:none}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 48px;background:rgba(8,8,8,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{font-weight:700;font-size:1.15rem;letter-spacing:-0.02em}.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{color:var(--muted);font-size:0.83rem;transition:color .2s}.nav-links a:hover{color:var(--text)}
.nav-cta{background:var(--accent);color:#fff;padding:8px 20px;border-radius:100px;font-size:0.83rem;font-weight:500;transition:opacity .2s,transform .2s}.nav-cta:hover{opacity:.85;transform:translateY(-1px)}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 32px 80px;position:relative;overflow:hidden}
.hero-glow{position:absolute;width:900px;height:600px;top:50%;left:50%;transform:translate(-50%,-55%);background:radial-gradient(ellipse,rgba(77,140,255,.13) 0%,transparent 70%);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:100px;padding:5px 14px;font-size:.73rem;font-weight:500;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:28px}
.hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.hero-title{font-size:clamp(4.5rem,12vw,10rem);font-weight:700;letter-spacing:-.04em;line-height:.9}
.hero-title .blue{color:var(--accent)}
.hero-sub{margin-top:24px;font-size:clamp(.95rem,1.8vw,1.2rem);color:var(--muted);font-weight:300;max-width:500px;line-height:1.75}
.hero-actions{margin-top:40px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;justify-content:center}
.btn-primary{display:inline-flex;align-items:center;gap:9px;background:var(--accent);color:#fff;padding:13px 30px;border-radius:100px;font-size:.9rem;font-weight:500;transition:opacity .2s,transform .2s,box-shadow .2s;box-shadow:0 0 28px var(--accent-glow)}.btn-primary:hover{opacity:.87;transform:translateY(-2px)}
.btn-ghost{display:inline-flex;align-items:center;gap:9px;background:transparent;border:1px solid var(--border);color:var(--text);padding:13px 26px;border-radius:100px;font-size:.9rem;transition:border-color .2s,background .2s,transform .2s}.btn-ghost:hover{border-color:var(--border2);background:rgba(255,255,255,.04);transform:translateY(-2px)}
.hero-scroll{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--muted);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase}
.scroll-line{width:1px;height:36px;background:linear-gradient(to bottom,var(--muted),transparent);animation:scrollPulse 2s infinite}

/* TICKER */
.ticker{border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:16px 0;overflow:hidden;background:var(--bg2)}
.ticker-track{display:flex;animation:ticker 30s linear infinite;width:max-content}.ticker-track:hover{animation-play-state:paused}
.ticker-item{padding:0 44px;font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:44px}
.ticker-item::after{content:'·';color:var(--border);font-size:1.4rem}

/* PLATFORM STATS */
.stats-section{padding:56px 48px;max-width:1300px;margin:0 auto}
.stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-top:32px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px 18px;display:flex;flex-direction:column;gap:10px;transition:border-color .2s,background .2s,transform .2s}.stat-card:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-2px)}
.stat-platform{display:flex;align-items:center;gap:9px}
.stat-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-name{font-family:'Space Grotesk',sans-serif;font-size:.82rem;font-weight:600}
.stat-count{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:-.02em}
.stat-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}

/* SECTION HEADERS */
.section-label{font-size:.68rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.section-title{font-size:clamp(1.6rem,3vw,2.4rem);font-weight:700;letter-spacing:-.03em;line-height:1.1;margin-bottom:10px}
.section-desc{color:var(--muted);font-size:.95rem;max-width:440px;line-height:1.7}

/* DASHBOARD GRID */
.dash-wrap{padding:0 48px 80px;max-width:1300px;margin:0 auto}
.dash-row{display:grid;gap:16px;margin-bottom:16px}
.dash-row-2{grid-template-columns:1.4fr 1fr}
.dash-row-3{grid-template-columns:1fr 1fr 1fr}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.panel-header{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
.panel-title{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:600;display:flex;align-items:center;gap:8px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.panel-action{font-size:.72rem;color:var(--muted);background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 10px;transition:color .2s,border-color .2s;cursor:pointer}.panel-action:hover{color:var(--text);border-color:var(--border2)}

/* AI CHAT */
.chat-messages{height:320px;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.chat-msg{display:flex;flex-direction:column;gap:4px;max-width:88%}
.chat-msg.user{align-self:flex-end;align-items:flex-end}
.chat-msg.ai{align-self:flex-start}
.chat-bubble{padding:10px 14px;border-radius:14px;font-size:.85rem;line-height:1.55}
.chat-msg.user .chat-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.chat-msg.ai .chat-bubble{background:var(--bg3);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border)}
.chat-meta{font-size:.68rem;color:var(--muted)}
.chat-chips{padding:10px 24px;display:flex;gap:7px;flex-wrap:wrap;border-top:1px solid var(--border)}
.chip{background:var(--bg3);border:1px solid var(--border);border-radius:100px;padding:5px 11px;font-size:.73rem;color:var(--muted);cursor:pointer;transition:all .18s;white-space:nowrap}.chip:hover{background:var(--accent-dim);border-color:var(--accent);color:var(--text)}
.chat-input-row{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:9px;align-items:center}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:9px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;transition:border-color .2s}.chat-input:focus{border-color:var(--accent)}
.chat-send{background:var(--accent);color:#fff;border-radius:10px;padding:9px 16px;font-size:.82rem;font-weight:500;transition:opacity .2s}.chat-send:hover{opacity:.85}.chat-send:disabled{opacity:.45}
.typing{display:flex;gap:4px;align-items:center;padding:10px 14px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:typing 1.2s infinite}.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

/* NEWS */
.news-list{height:420px;overflow-y:auto;padding:12px 24px;display:flex;flex-direction:column;gap:2px;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.news-item{padding:12px 0;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:5px;cursor:pointer;transition:opacity .18s}.news-item:hover{opacity:.8}.news-item:last-child{border-bottom:none}
.news-headline{font-size:.84rem;font-weight:500;line-height:1.45;color:var(--text)}
.news-meta{display:flex;align-items:center;gap:9px;font-size:.7rem;color:var(--muted)}
.news-tag{background:var(--bg4);border-radius:5px;padding:2px 7px;font-size:.65rem;font-weight:600;letter-spacing:.04em}

/* VIDEO */
.video-card{padding:24px}
.video-thumb{aspect-ratio:16/9;border-radius:14px;overflow:hidden;background:var(--bg3);border:1px solid var(--border);position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s}.video-thumb:hover{border-color:var(--border2)}
.video-thumb-bg{position:absolute;inset:0;opacity:.05}
.play-circle{width:64px;height:64px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px var(--accent-glow);transition:transform .2s,box-shadow .2s;z-index:1}.video-thumb:hover .play-circle{transform:scale(1.1);box-shadow:0 0 56px var(--accent-glow)}
.video-info{margin-top:16px;display:flex;flex-direction:column;gap:4px}
.video-title{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:600}
.video-sub{font-size:.78rem;color:var(--muted)}

/* BRANDS */
.brands-section{padding:0 48px 80px;max-width:1300px;margin:0 auto}
.brands-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-top:40px}
.brand-card{background:var(--bg2);padding:36px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;transition:background .2s,transform .2s;cursor:default}.brand-card:hover{background:var(--bg3)}
.brand-name{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:600}
.brand-desc{font-size:.72rem;color:var(--muted);line-height:1.45}

/* NEWSLETTER */
.nl-section{padding:0 48px 80px;max-width:1300px;margin:0 auto}
.nl-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:56px 56px;display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;position:relative;overflow:hidden}
.nl-box::before{content:'';position:absolute;top:-80px;right:-80px;width:400px;height:400px;background:radial-gradient(circle,rgba(83,252,24,.07) 0%,transparent 70%)}
.nl-form{display:flex;flex-direction:column;gap:10px}
.nl-input{background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:12px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s}.nl-input::placeholder{color:var(--muted)}.nl-input:focus{border-color:var(--accent)}
.nl-btn{background:var(--accent);color:#fff;padding:13px;border-radius:11px;font-size:.9rem;font-weight:500;transition:opacity .2s,transform .2s}.nl-btn:hover{opacity:.85;transform:translateY(-1px)}
.nl-note{font-size:.7rem;color:var(--muted);text-align:center}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:32px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.footer-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:-.02em}.footer-logo span{color:var(--accent)}
.footer-links{display:flex;gap:24px;flex-wrap:wrap}
.footer-links a{color:var(--muted);font-size:.78rem;transition:color .2s}.footer-links a:hover{color:var(--text)}
.footer-copy{font-size:.7rem;color:var(--muted)}

/* TWEAKS */
#tweaks-panel{display:none;position:fixed;bottom:24px;right:24px;z-index:9999;background:#111;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:18px 20px;min-width:210px;box-shadow:0 8px 40px rgba(0,0,0,.6);font-size:.8rem;color:var(--muted)}
#tweaks-panel.open{display:block}
#tweaks-panel h4{font-family:'Space Grotesk',sans-serif;color:var(--text);font-size:.83rem;margin-bottom:12px}
.tweak-row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.tweak-row label{font-size:.72rem;color:var(--muted)}
.tweak-row select,.tweak-row input[type=color]{background:#1a1a1a;border:1px solid rgba(255,255,255,.08);color:var(--text);border-radius:7px;padding:5px 9px;font-family:'DM Sans',sans-serif;font-size:.77rem;cursor:pointer;width:100%}
.tweak-row input[type=color]{height:34px;padding:3px}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes scrollPulse{0%,100%{opacity:.3}50%{opacity:.8}}
.anim-1{animation:fadeUp .7s ease both}
.anim-2{animation:fadeUp .7s .1s ease both}
.anim-3{animation:fadeUp .7s .2s ease both}
.anim-4{animation:fadeUp .7s .3s ease both}

@media(max-width:1100px){.stats-grid{grid-template-columns:repeat(3,1fr)}.dash-row-2,.dash-row-3{grid-template-columns:1fr}.brands-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.nav{padding:14px 20px}.stats-section,.dash-wrap,.brands-section,.nl-section{padding-left:20px;padding-right:20px}.nl-box{grid-template-columns:1fr;padding:32px 24px;gap:28px}footer{padding:24px 20px}}
</style>
</head>

function AIChat() {
  const SYSTEM = `You are a helpful content creation AI assistant for Bklynsdon, a Brooklyn-based tech YouTuber and streamer who reviews Apple, Samsung, Ugreen, Logitech, Nintendo, and Pokémon products. You provide specific, actionable tips about content creation, tech trends, and growing on platforms like YouTube, Kick, Twitch, TikTok, and Instagram. Be concise (2-4 sentences), friendly, and knowledgeable. Always ask a relevant follow-up question to keep the conversation going.`;
  const [msgs, setMsgs] = useState([
    { role:'ai', text:"Hey! I'm your content creation AI. Ask me about tech trends, review ideas, or how to grow your channel. What are you working on? 🎬", time:'just now' }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.parentElement && (endRef.current.parentElement.scrollTop = endRef.current.parentElement.scrollHeight); }, [msgs, loading]);

  const send = async (text) => {
    if (!text.trim() || loading) return;
    const userMsg = { role:'user', text, time:'just now' };
    setMsgs(m => [...m, userMsg]);
    setInput('');
    setLoading(true);
    try {
      const history = [...msgs, userMsg].map(m => ({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.text }));
      const allMsgs = [{ role:'user', content: SYSTEM + '\n\n' + history[0].content }, ...history.slice(1)];
      const reply = await window.claude.complete({ messages: allMsgs });
      setMsgs(m => [...m, { role:'ai', text: reply, time:'just now' }]);
    } catch(e) {
      setMsgs(m => [...m, { role:'ai', text:'Sorry, having trouble connecting. Try again in a moment!', time:'just now' }]);
    }
    setLoading(false);
  };

  return (
    <div className="panel" id="assistant">
      <div className="panel-header">
        <div className="panel-title"><div className="live-dot" />AI Content Assistant</div>
        <span style={{fontSize:'.7rem',color:'var(--muted)'}}>Powered by Claude</span>
      </div>
      <div className="chat-messages">
        {msgs.map((m, i) => (
          <div key={i} className={`chat-msg ${m.role}`}>
            <div className="chat-bubble">{m.text}</div>
            <span className="chat-meta">{m.role === 'ai' ? 'AI Assistant' : 'You'} · {m.time}</span>
          </div>
        ))}
        {loading && (
          <div className="chat-msg ai">
            <div className="chat-bubble" style={{padding:'6px 14px'}}>
              <div className="typing"><span/><span/><span/></div>
            </div>
          </div>
        )}
        <div ref={endRef} />
      </div>
      <div className="chat-chips">
        {CHIPS.map(c => <button key={c} className="chip" onClick={() => send(c)}>{c}</button>)}
      </div>
      <div className="chat-input-row">
        <input className="chat-input" placeholder="Ask about content creation, tech trends..." value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key==='Enter' && send(input)} />
        <button className="chat-send" onClick={() => send(input)} disabled={loading || !input.trim()}>Send</button>
      </div>
    </div>
  );
}
